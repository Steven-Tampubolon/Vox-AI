name: Lint & Build Check

# Jalan di SETIAP push/PR ke branch apapun (bukan tag)
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  build:
    runs-on: ubuntu-latest
    needs: golangci-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build ./...